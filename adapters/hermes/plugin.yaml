name: agent-aegis
version: 1.0.0
description: "Runtime security plugin — defense-in-depth for Hermes Agent (powered by AgentAegis)"
author: QYQClaw
license: MIT

external_dependencies:
  - name: node
    install: "Install Node.js >= 20 via nvm or your package manager"
    check: "node --version"

hooks:
  - on_session_start
  - on_session_end
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
